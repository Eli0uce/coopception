<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>STATION ZÉRO — Technicien</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/technician.css">
</head>
<body>
<div class="scanline"></div>

<div id="start-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:8000;flex-direction:column;gap:20px;">
  <div style="font-family:'VT323',monospace;font-size:60px;color:var(--green);text-shadow:var(--glow);">STATION ZÉRO</div>
  <div style="font-size:14px;letter-spacing:3px;color:var(--green-dim)">RÔLE : <span style="color:var(--green)">TECHNICIEN</span></div>
  <div style="font-size:13px;color:var(--amber);letter-spacing:2px;text-align:center;max-width:400px;line-height:1.8;">
    Vous avez accès aux manuels numériques.<br>Guidez l'Opérateur à travers les panneaux de contrôle.
  </div>
  <button class="btn primary" id="btn-start">⚡ LANCER LA MISSION</button>
</div>

<div id="end-overlay">
  <div id="end-card">
    <h1 id="end-title">VICTOIRE</h1>
    <p id="end-reason"></p>
    <button class="btn" onclick="location.href='/'">↩ RETOUR AU LOBBY</button>
  </div>
</div>

<div class="tech-layout" id="game-area" style="display:none;">
  <div class="tech-header">
    <div class="role-label">🖥 TECHNICIEN</div>
    <div id="timer-display">15:00</div>
    <div class="module-name" id="module-name">MODULE ???</div>
  </div>
  <div class="tech-main">
    <div class="terminal-block" id="info-panel" data-title="INFORMATIONS SYSTÈME">
      <div id="puzzle-info"></div>
    </div>
    <div class="terminal-block" id="log-panel" data-title="LOG SYSTÈME">
      <div id="log-content" style="color:var(--green-dim);font-size:13px;line-height:2;"></div>
    </div>
  </div>
  <div class="tech-footer">
    <div class="puzzle-progress" id="puzzle-dots"></div>
    <div style="font-size:12px;color:var(--green-dim);" id="footer-status">EN ATTENTE...</div>
  </div>
</div>

<div id="chat-widget">
  <div id="chat-body" style="display:flex;">
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Message...">
      <button id="chat-send">➤</button>
    </div>
  </div>
  <button id="chat-toggle">💬 COMM — MASQUER</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-db.js"></script>
<script src="js/puzzles.js"></script>
<script src="js/chat.js"></script>
<script src="js/technician.js"></script>
</body>
</html>
